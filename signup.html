<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Watchlist Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="auth-body">

    <div class="auth-container">
        <h2>Create an Account</h2>
        <p>Join us and start tracking your movies.</p>
        
        <div id="signupError" class="error-box" style="display: none;"></div>

        <form id="signupForm">
            <div class="input-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="John Doe">
            </div>
            <div class="input-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" placeholder="Enter your email">
            </div>
            <div class="input-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="Create a password">
            </div>
            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat your password">
            </div>
            <button type="submit" class="auth-btn">Sign Up</button>
        </form>

        <p class="auth-link">Already have an account? <a href="index.html">Login here</a></p>
    </div>

</body>
</html>
